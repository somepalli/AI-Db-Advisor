server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Reverse-proxy API calls to the backend. The trailing slash on proxy_pass
    # strips the /api prefix: /api/healthz -> backend /healthz.
    location /api/ {
        proxy_pass http://backend:8095/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Streaming (SSE) for /api/ai-chat/chat/stream: don't buffer, allow long reads.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # SPA fallback — serve index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
