server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's embedded DNS so the "backend" hostname is resolved lazily at
    # request time, not once at startup. Without this, nginx refuses to start
    # with "host not found in upstream" if the backend container isn't up yet.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Reverse-proxy API calls to the backend. Stripping /api: the rewrite turns
    # /api/healthz into /healthz before proxying. proxy_pass uses a variable
    # ($backend) so the lazy resolver above is actually consulted.
    location /api/ {
        set $backend "http://backend:8095";
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Streaming (SSE) for /api/ai-chat/chat/stream: don't buffer, allow long reads.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # SPA fallback — serve index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
