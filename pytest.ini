[pytest]
# Root pytest config — run from the repo root so the `backend` package imports.
testpaths = backend/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts =
    --strict-markers
    --tb=short
    --disable-warnings
    -ra

markers =
    unit: Unit tests for individual functions
    integration: Tests requiring live external services (DB, MCP bridge, Google API)
    ui: UI page tests
    e2e: End-to-end workflow tests
    slow: Tests that take longer to run

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
