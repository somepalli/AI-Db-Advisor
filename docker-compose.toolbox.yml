version: '3.8'

services:
  toolbox:
    image: us-central1-docker.pkg.dev/database-toolbox/toolbox/toolbox:0.18.0
    container_name: mcp-toolbox
    env_file:
      - .env.toolbox
    volumes:
      - ./toolbox/tools.yaml:/app/tools.yaml:ro
    command:
      - "--tools-file=/app/tools.yaml"
      - "--address=0.0.0.0"
      - "--port=${TOOLBOX_PORT:-5001}"
      - "--log-level=INFO"
    ports:
      - "${TOOLBOX_PORT:-5001}:${TOOLBOX_PORT:-5001}"
    restart: unless-stopped
    networks:
      - toolbox_net

networks:
  toolbox_net:
    driver: bridge
