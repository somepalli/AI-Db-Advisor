# Toolbox configuration for ClickHouse (read-only)

sources:
  clickhouse-source:
    kind: clickhouse
    host: ${CLICKHOUSE_HOST}
    port: ${CLICKHOUSE_PORT}
    protocol: ${CLICKHOUSE_PROTOCOL}
    user: ${CLICKHOUSE_USER}
    password: ${CLICKHOUSE_PASSWORD}
    database: ${CLICKHOUSE_DATABASE}

tools:
  list_tables:
    kind: clickhouse-list-tables
    source: clickhouse-source
    description: List tables available in the configured ClickHouse database.

  list_databases:
    kind: clickhouse-list-databases
    source: clickhouse-source
    description: List all databases accessible to the ClickHouse user.

  describe_table:
    kind: clickhouse-sql
    source: clickhouse-source
    description: Describe table schema (columns, types, default expressions).
    statement: |
      DESCRIBE TABLE {{ database_name }}.{{ table_name }}
    templateParameters:
      - name: database_name
        description: Database that owns the table.
        type: string
        default: ${CLICKHOUSE_DATABASE}
      - name: table_name
        description: Target table name (without database prefix).
        type: string

  run_select_query:
    kind: clickhouse-sql
    source: clickhouse-source
    description: Execute read-only SELECT queries for analytics and inspection.
    statement: |
      {{ select_statement }}
    templateParameters:
      - name: select_statement
        description: Full SELECT statement (must begin with SELECT and cannot modify data).
        type: string

toolsets:
  clickhouse_read_only:
    - list_tables
    - list_databases
    - describe_table
    - run_select_query
