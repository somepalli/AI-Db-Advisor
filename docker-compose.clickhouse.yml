version: '3.8'

services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.7
    container_name: clickhouse
    env_file:
      - .env.clickhouse
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-ai_db_advisor}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-ai_db_advisor}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-ChangeMe123!}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: ${CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT:-1}
    ports:
      - "${CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "${CLICKHOUSE_NATIVE_PORT:-9000}:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --host localhost --user ${CLICKHOUSE_USER:-ai_db_advisor} --password ${CLICKHOUSE_PASSWORD:-ChangeMe123!} --query 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - clickhouse_net

  clickhouse-exporter:
    image: f1yegor/clickhouse-exporter:latest
    container_name: clickhouse-exporter
    env_file:
      - .env.clickhouse
    environment:
      CLICKHOUSE_USERNAME: ${CLICKHOUSE_USER:-ai_db_advisor}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-ChangeMe123!}
    command:
      - "--scrape_uri=http://${CLICKHOUSE_INTERNAL_HOST:-clickhouse}:8123/"
    ports:
      - "${CLICKHOUSE_EXPORTER_PORT:-9116}:9116"
    depends_on:
      clickhouse:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - clickhouse_net

networks:
  clickhouse_net:
    driver: bridge

volumes:
  clickhouse_data:
  clickhouse_logs:
