groups:
  # FastAPI Backend Alerts
  - name: fastapi_alerts
    interval: 30s
    rules:
      - alert: HighErrorRate
        expr: |
          (
            sum(rate(http_requests_total{job="ai-db-advisor-app",status=~"5.."}[5m]))
            /
            sum(rate(http_requests_total{job="ai-db-advisor-app"}[5m]))
          ) > 0.05
        for: 2m
        labels:
          severity: critical
          service: fastapi
        annotations:
          summary: "High error rate on FastAPI backend"
          description: "Error rate is {{ $value | humanizePercentage }}. More than 5% of requests are failing."
          dashboard: "http://localhost:3001/d/fastapi-backend"

      - alert: SlowAPIResponse
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{job="ai-db-advisor-app"}[5m])) > 2
        for: 3m
        labels:
          severity: warning
          service: fastapi
        annotations:
          summary: "Slow API responses detected"
          description: "95th percentile response time is {{ $value }}s (threshold: 2s)"
          dashboard: "http://localhost:3001/d/fastapi-backend"

      - alert: HighRequestLoad
        expr: sum(rate(http_requests_total{job="ai-db-advisor-app"}[1m])) > 100
        for: 2m
        labels:
          severity: warning
          service: fastapi
        annotations:
          summary: "High request load on FastAPI"
          description: "Request rate is {{ $value }} req/sec (threshold: 100 req/sec)"
          dashboard: "http://localhost:3001/d/fastapi-backend"

      - alert: TooManyActiveRequests
        expr: http_requests_inprogress{job="ai-db-advisor-app"} > 50
        for: 1m
        labels:
          severity: warning
          service: fastapi
        annotations:
          summary: "Too many concurrent requests"
          description: "{{ $value }} requests are being processed concurrently (threshold: 50)"
          dashboard: "http://localhost:3001/d/fastapi-backend"

      - alert: FastAPIDown
        expr: up{job="ai-db-advisor-app"} == 0
        for: 1m
        labels:
          severity: critical
          service: fastapi
        annotations:
          summary: "FastAPI backend is down"
          description: "FastAPI service is not responding to health checks"
          dashboard: "http://localhost:3001/d/fastapi-backend"

  # MCP Bridge Alerts
  - name: mcp_alerts
    interval: 30s
    rules:
      - alert: MCPServerDown
        expr: mcp_server_status{job="mcp-bridge"} == 0
        for: 1m
        labels:
          severity: critical
          service: mcp
        annotations:
          summary: "MCP server is down"
          description: "MCP bridge reports server status as DOWN"
          dashboard: "http://localhost:3001/d/mcp-bridge"

      - alert: MCPServerErrors
        expr: |
          (
            sum(rate(mcp_requests_total{job="mcp-bridge",status="error"}[5m]))
            /
            sum(rate(mcp_requests_total{job="mcp-bridge"}[5m]))
          ) > 0.05
        for: 5m
        labels:
          severity: warning
          service: mcp
        annotations:
          summary: "MCP bridge error rate elevated"
          description: "Error responses exceed 5% over the last 5 minutes (value: {{ $value | humanizePercentage }})."
          dashboard: "http://localhost:3001/d/mcp-bridge"

      - alert: MCPLatencyHigh
        expr: histogram_quantile(0.95, rate(mcp_request_duration_seconds_bucket{job="mcp-bridge"}[10m])) > 2
        for: 10m
        labels:
          severity: info
          service: mcp
        annotations:
          summary: "MCP bridge latency elevated"
          description: "95th percentile MCP response time is {{ $value }}s (threshold: 2s)."
          dashboard: "http://localhost:3001/d/mcp-bridge"

      - alert: MCPNoToolsDiscovered
        expr: mcp_tools_discovered{job="mcp-bridge"} == 0
        for: 2m
        labels:
          severity: warning
          service: mcp
        annotations:
          summary: "No MCP tools discovered"
          description: "MCP bridge has not discovered any tools"
          dashboard: "http://localhost:3001/d/mcp-bridge"

      - alert: MCPBridgeDown
        expr: up{job="mcp-bridge"} == 0
        for: 1m
        labels:
          severity: critical
          service: mcp
        annotations:
          summary: "MCP bridge is down"
          description: "MCP bridge service is not responding"
          dashboard: "http://localhost:3001/d/mcp-bridge"

  - name: clickhouse_alerts
    interval: 30s
    rules:
      - alert: ClickHouseDown
        expr: up{job="clickhouse"} == 0
        for: 1m
        labels:
          severity: critical
          service: clickhouse
        annotations:
          summary: "ClickHouse exporter unreachable"
          description: "ClickHouse metrics endpoint has been down for over a minute."
          dashboard: "http://localhost:3001/d/clickhouse-overview"

      - alert: ClickHousePingSlow
        expr: |
          (increase(clickhouse_select_query_total[5m]) > 0)
          and
          (
            increase(clickhouse_select_query_time_microseconds_total[5m])
            /
            increase(clickhouse_select_query_total[5m])
          ) > 500000
        for: 5m
        labels:
          severity: warning
          service: clickhouse
        annotations:
          summary: "ClickHouse average SELECT latency high"
          description: 'Average SELECT latency over the last 5m is above 500ms. Value: {{ printf "%.0f" $value }} μs'
          dashboard: "http://localhost:3001/d/clickhouse-overview"

      - alert: QueryErrorSpike
        expr: delta(clickhouse_query_preempted[5m]) > 5
        for: 5m
        labels:
          severity: critical
          service: clickhouse
        annotations:
          summary: "Spike in preempted ClickHouse queries"
          description: "More than five queries were preempted in the last 5 minutes, indicating possible errors or cancellations."
          dashboard: "http://localhost:3001/d/clickhouse-overview"

      - alert: QueryLatencyHigh
        expr: |
          (increase(clickhouse_select_query_total[10m]) > 0)
          and
          (
            increase(clickhouse_select_query_time_microseconds_total[10m])
            /
            increase(clickhouse_select_query_total[10m])
          ) > 300000
        for: 10m
        labels:
          severity: warning
          service: clickhouse
        annotations:
          summary: "Sustained ClickHouse query latency"
          description: 'Average SELECT latency has remained above 300ms for 10 minutes. Value: {{ printf "%.0f" $value }} μs'
          dashboard: "http://localhost:3001/d/clickhouse-overview"

      - alert: InsertStall
        expr: clickhouse_async_insert_queue_size > 50
        for: 10m
        labels:
          severity: warning
          service: clickhouse
        annotations:
          summary: "ClickHouse async insert queue growing"
          description: "Async insert queue size is above 50 for more than 10 minutes. Current size: {{ $value }}"
          dashboard: "http://localhost:3001/d/clickhouse-overview"

      - alert: DiskSpaceLow
        expr: clickhouse_disk_available_default / clickhouse_disk_total_default < 0.1
        for: 5m
        labels:
          severity: critical
          service: clickhouse
        annotations:
          summary: "ClickHouse disk space low"
          description: "Available disk space below 10% (ratio: {{ $value | humanizePercentage }})."
          dashboard: "http://localhost:3001/d/clickhouse-overview"

      - alert: PartsExplosion
        expr: max(clickhouse_table_parts_count{database!="system"}) > 200
        for: 10m
        labels:
          severity: warning
          service: clickhouse
        annotations:
          summary: "ClickHouse parts per table too high"
          description: "At least one table has more than 200 active parts."
          dashboard: "http://localhost:3001/d/clickhouse-overview"

      - alert: ReplicaLagHigh
        expr: clickhouse_replicas_max_absolute_delay > 30
        for: 5m
        labels:
          severity: critical
          service: clickhouse
        annotations:
          summary: "Replica lag detected"
          description: "Replica absolute delay is above 30 seconds. Current delay: {{ $value }}s"
          dashboard: "http://localhost:3001/d/clickhouse-overview"

      - alert: MergesBacklog
        expr: clickhouse_replicas_sum_merges_in_queue > 20
        for: 10m
        labels:
          severity: warning
          service: clickhouse
        annotations:
          summary: "ClickHouse merge queue backlog"
          description: "Replica merge queue has over 20 items for 10 minutes. Current queue size: {{ $value }}"
          dashboard: "http://localhost:3001/d/clickhouse-overview"

      - alert: TooManyConnections
        expr: clickhouse_tcp_connection > 200
        for: 5m
        labels:
          severity: critical
          service: clickhouse
        annotations:
          summary: "ClickHouse connections near limit"
          description: "TCP connections exceed 200. Current value: {{ $value }}"
          dashboard: "http://localhost:3001/d/clickhouse-overview"

      - alert: MemoryLimitBreached
        expr: clickhouse_memory_tracking > (clickhouse_os_memory_total * 0.9)
        for: 5m
        labels:
          severity: critical
          service: clickhouse
        annotations:
          summary: "ClickHouse memory usage critical"
          description: "Tracked ClickHouse memory exceeds 90% of available system memory."
          dashboard: "http://localhost:3001/d/clickhouse-overview"

      - alert: CPUThrottling
        expr: rate(process_cpu_seconds_total[5m]) > 3
        for: 10m
        labels:
          severity: info
          service: clickhouse
        annotations:
          summary: "ClickHouse high CPU consumption"
          description: "CPU utilisation equivalent to >300% has persisted for 10 minutes."
          dashboard: "http://localhost:3001/d/clickhouse-overview"

  # PostgreSQL Database Alerts
  - name: postgres_alerts
    interval: 30s
    rules:
      - alert: PostgreSQLDown
        expr: pg_up{job="postgres-universitydb"} == 0
        for: 1m
        labels:
          severity: critical
          service: postgresql
        annotations:
          summary: "PostgreSQL database is down"
          description: "UniversityDB database is not responding"
          dashboard: "http://localhost:3001/d/postgres"

      - alert: HighDatabaseConnections
        expr: pg_stat_database_numbackends{job="postgres-universitydb"} > 80
        for: 3m
        labels:
          severity: warning
          service: postgresql
        annotations:
          summary: "High database connection count"
          description: "{{ $value }} active connections (threshold: 80)"
          dashboard: "http://localhost:3001/d/postgres"

      - alert: TooManyDatabaseLocks
        expr: sum(pg_locks_count{job="postgres-universitydb"}) > 100
        for: 2m
        labels:
          severity: warning
          service: postgresql
        annotations:
          summary: "Too many database locks"
          description: "{{ $value }} locks detected (threshold: 100)"
          dashboard: "http://localhost:3001/d/postgres"

  # System-wide Alerts
  - name: system_alerts
    interval: 30s
    rules:
      - alert: HighPythonGCActivity
        expr: rate(python_gc_collections_total{job="ai-db-advisor-app"}[5m]) > 10
        for: 5m
        labels:
          severity: info
          service: fastapi
        annotations:
          summary: "High Python garbage collection activity"
          description: "GC rate is {{ $value }} collections/sec - may indicate memory pressure"
          dashboard: "http://localhost:3001/d/fastapi-backend"
